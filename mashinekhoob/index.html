<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0d0d0d" />
    <title>ماشین خوب – خرید خودرو. آنلاین</title>
    <meta name="description" content="واردات و خرید خودروهای اروپایی و چینی با خدمات کامل: جستجو، بازرسی، ترخیص گمرکی و تحویل درب منزل. قیمت شفاف و همه‌چیز‌شامل." />

    <!-- Open Graph / Twitter. TODO: replace og:url with your real domain and add
         a 1200×630 image at public/og-image.jpg before sharing on social. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ماشین خوب – خرید خودرو. آنلاین" />
    <meta property="og:description" content="واردات و خرید خودروهای اروپایی و چینی با خدمات کامل: جستجو، بازرسی، ترخیص گمرکی و تحویل درب منزل." />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:url" content="https://mashinekhoob.com/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ماشین خوب – خرید خودرو. آنلاین" />
    <meta name="twitter:description" content="واردات و خرید خودروهای اروپایی و چینی با خدمات کامل." />
    <meta name="twitter:image" content="/og-image.jpg" />
    <!-- Start downloading the hero car during HTML parse, in parallel with the
         JS bundle, so the sweep-in animation can play as early as possible. -->
    <link rel="preload" href="/mercedes-_benz_w206_c220.glb" as="fetch" type="model/gltf-binary" crossorigin="anonymous" fetchpriority="high" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts without blocking first paint: fetch as a non-applied "print"
         stylesheet, then promote to "all" once loaded. display=swap keeps text
         visible in a fallback face until Inter arrives. -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
